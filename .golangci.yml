version: "2"
linters:
  default: all
  disable:
  - wsl
  - exhaustruct
  - gochecknoglobals
  - gochecknoinits
  settings:
    cyclop:
       max-complexity: 15
    # exhaustruct ttp\.Server$'
    depguard:
      rules:
        main:
          list-mode: lax
          allow:
          - "github.com/spf13/cobra"
    funlen:
      lines: 130
