stages:
  - build

variables:
  IMAGE_NAME: "$CI_REGISTRY_IMAGE/infra-helper"

build:image:
  stage: build
  # Build & push without Docker daemon (works with docker executor).
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  tags:
    - build
  script:
    - mkdir -p /kaniko/.docker
    - |
      cat > /kaniko/.docker/config.json <<EOF
      {"auths":{"$CI_REGISTRY":{"username":"$CI_REGISTRY_USER","password":"$CI_REGISTRY_PASSWORD"}}}
      EOF
    - |
      DESTS="--destination $IMAGE_NAME:$CI_COMMIT_SHA"

      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        DESTS="$DESTS --destination $IMAGE_NAME:latest"
      fi

      if [ -n "$CI_COMMIT_TAG" ]; then
        DESTS="$DESTS --destination $IMAGE_NAME:$CI_COMMIT_TAG"
      fi

      /kaniko/executor \
        --context "$CI_PROJECT_DIR" \
        --dockerfile "$CI_PROJECT_DIR/Dockerfile" \
        --cache=true \
        --cache-repo "$IMAGE_NAME/cache" \
        $DESTS
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH
