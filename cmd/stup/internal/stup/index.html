<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Plex Web</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #282a2d;
      color: #1f1f1f;
      font-family: "Open Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 16px 40px;
    }
    .logo {
      margin-bottom: 32px;
      user-select: none;
      line-height: 0;
    }
    .card {
      background: #fff;
      width: 100%;
      max-width: 540px;
      padding: 48px 64px 32px;
    }
    h1 {
      margin: 0;
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: #1d1d1d;
      letter-spacing: 0.1px;
    }
    .subtitle {
      margin: 6px 0 28px;
      text-align: center;
      color: #5e6470;
      font-size: 14px;
    }
    .tos {
      margin: 0 0 26px;
      text-align: center;
      color: #5e6470;
      font-size: 13px;
      line-height: 1.55;
      padding: 0 4px;
    }
    .tos b { color: #2a2a2a; font-weight: 700; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #2a2a2a;
      letter-spacing: 0.2px;
    }
    .row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    .field { margin-top: 20px; }
    .forgot {
      color: #6b6f78;
      font-size: 13px;
      text-decoration: none;
    }
    .forgot:hover { color: #cc7b19; }
    input[type=text],
    input[type=password] {
      width: 100%;
      border: 0;
      border-bottom: 1px solid #cfd3d9;
      background: transparent;
      font-size: 15px;
      padding: 6px 0;
      margin-top: 6px;
      outline: none;
      color: #1f1f1f;
      font-family: inherit;
    }
    input:focus { border-bottom-color: #cc7b19; }
    .err {
      color: #c0392b;
      font-size: 13px;
      margin-top: 14px;
      min-height: 18px;
    }
    button.signin {
      margin-top: 6px;
      width: 100%;
      padding: 14px 0;
      background: #cc7b19;
      color: #fff;
      border: 0;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.4px;
      cursor: pointer;
      font-family: inherit;
    }
    button.signin:hover { background: #b86c12; }
    .signup {
      margin: 24px 0 22px;
      text-align: center;
      color: #5e6470;
      font-size: 13px;
      line-height: 1.55;
    }
    .signup a {
      color: #2a2a2a;
      font-weight: 700;
      text-decoration: none;
    }
    .whats {
      display: block;
      text-align: center;
      color: #cc7b19;
      font-weight: 700;
      font-size: 13px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="logo" aria-label="plex">
    <svg width="156" height="50" viewBox="0 0 156 50" xmlns="http://www.w3.org/2000/svg">
      <text x="0" y="40" font-family="Helvetica, Arial, sans-serif" font-weight="900" font-size="46" fill="#ffffff" letter-spacing="-1.5">ple</text>
      <path d="M86 6 L100 6 L120 25 L100 44 L86 44 L106 25 Z" fill="#ffffff"/>
      <path d="M114 6 L128 6 L148 25 L128 44 L114 44 L134 25 Z" fill="#e5a00d"/>
    </svg>
  </div>

  <div class="card">
    <h1>Plex Web</h1>
    <div class="subtitle">would like to sign in to your Plex account</div>
    <p class="tos">By signing up or continuing to use Plex you confirm that you've read and accept the <b>Terms of Service</b> and <b>Privacy Policy</b>.</p>

    <form id="signin" autocomplete="off" novalidate>
      <div class="field">
        <label for="user">Email or Username</label>
        <input id="user" type="text" autocapitalize="none" autocorrect="off" spellcheck="false">
      </div>
      <div class="field">
        <div class="row">
          <label for="pass">Password</label>
          <a class="forgot" href="#">Forgot?</a>
        </div>
        <input id="pass" type="password">
      </div>
      <div class="err" id="err" role="alert" aria-live="polite"></div>
      <button type="submit" class="signin">Sign In</button>
    </form>

    <p class="signup">
      Need an account? <a href="#">sign up with email</a>
    </p>
    <a class="whats" href="#">What's this?</a>
  </div>

<script>
  document.getElementById('signin').addEventListener('submit', function (e) {
    e.preventDefault();
    document.getElementById('err').textContent = 'wrong password';
  });
</script>
</body>
</html>
